<div class="forgot-password-wrapper">
    <button class="back-link" (click)="goBack()">
        <span class="material-symbols-rounded">arrow_back</span>
        Back
    </button>

    <div class="logo-area">
        <img src="assets/logo.png" alt="OfficeWing Logo" class="logo">
    </div>

    <div class="content-container">
        <div *ngIf="message" class="status-message" [class.error]="isError" [class.success]="!isError">
            {{ message }}
        </div>

        <h1 class="page-title">Enter Email</h1>
        <p class="subtitle">Enter the email associated with your account to receive an OTP.</p>

        <form (ngSubmit)="onSendOtp()" #otpForm="ngForm" class="otp-form">
            <div class="form-group">
                <div class="input-wrapper">
                    <span class="material-symbols-rounded input-icon">mail</span>
                    <input type="email" [(ngModel)]="email" name="email" placeholder="Email Address" required email
                        #emailInput="ngModel">
                </div>
                <div *ngIf="emailInput.invalid && (emailInput.dirty || emailInput.touched)" class="error-message">
                    <span *ngIf="emailInput.errors?.['required']">Email is required.</span>
                    <span *ngIf="emailInput.errors?.['email']">Please enter a valid email.</span>
                </div>
            </div>

            <button type="submit" class="submit-btn" [disabled]="!otpForm.valid">Send OTP</button>
        </form>
    </div>
</div>
