version: 0.2
env:
  secrets-manager:
    PSQL_USERNAME: officewingenv:PSQL_USERNAME
    PSQL_PASSWORD: officewingenv:PSQL_PASSWORD
phases:
  pre_build:
    commands:
      - cd backend
      - mvn clean install
      - echo now login into AWS ECR
      - REPOSITORY_URI=696263047337.dkr.ecr.ap-south-1.amazonaws.com/officewing
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin $REPOSITORY_URI
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')
  build:
    commands:
      - echo now building the docker image
      - docker build -t $REPOSITORY_URI:latest .
      - docker tag $REPOSITORY_URI:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo now push build image to ECR
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - printf '[{"name":"officewing","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - cat imagedefinitions.json
artifacts:
  files:
    - imagedefinitions.json